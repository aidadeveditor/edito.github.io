<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éditeur WYSIWYG 3 Panneaux Bidirectionnel</title>
    
    <style>
        :root {
            --bg-color: #f8f9fa;
            --panel-bg: #ffffff;
            --text-color: #212529;
            --border-color: #dee2e6;
            --header-bg: #e9ecef;
            --btn-bg: #0d6efd;
            --btn-text: #ffffff;
            --btn-hover: #0b5ed7;
            --modal-bg: #ffffff;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--header-bg);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 10px;
        }

        .toolbar-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        button {
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        button:hover { background-color: var(--btn-hover); }
        .btn-secondary { background-color: #6c757d; }
        .btn-secondary:hover { background-color: #5c636a; }

        .text-format-toolbar {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            background-color: var(--header-bg);
            padding: 5px;
            border-bottom: 1px solid var(--border-color);
        }

        .text-format-toolbar button {
            background-color: #ffffff;
            color: #333;
            border: 1px solid #ccc;
            padding: 4px 8px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .text-format-toolbar button:hover { background-color: #e2e6ea; }

        main {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            flex-grow: 1;
            gap: 10px;
            padding: 10px;
            overflow: hidden;
        }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            background-color: var(--header-bg);
            padding: 8px 12px;
            font-weight: bold;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-content {
            flex-grow: 1;
            padding: 15px;
            overflow-y: auto;
            width: 100%;
            box-sizing: border-box;
        }

        #visual-editor {
            width: 100%;
            height: 100%;
            outline: none;
            line-height: 1.5;
        }
        
        #visual-editor:empty:before {
            content: attr(data-placeholder);
            color: #888;
        }

        textarea {
            width: 100%;
            height: 100%;
            border: none;
            resize: none;
            background: transparent;
            color: inherit;
            font-family: 'Courier New', monospace;
            outline: none;
            line-height: 1.4;
        }

        .preview-container {
            display: flex;
            justify-content: center;
            background-color: #555;
            padding: 10px;
        }

        #preview-output {
            width: 100%; 
            height: 100%;
            transition: width 0.3s ease, background-color 0.3s, color 0.3s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        #preview-output.mobile-view { width: 375px; }
        #preview-output.tablet-view { width: 768px; }
        #preview-output.desktop-view { width: 100%; }

        #preview-output.theme-light { background-color: #ffffff; color: #000000; }
        #preview-output.theme-dark { background-color: #121212; color: #f0f0f0; }

        dialog {
            background-color: var(--modal-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        dialog::backdrop { background: rgba(0, 0, 0, 0.6); }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        .form-group input { padding: 8px; border: 1px solid var(--border-color); border-radius: 4px; }
        .dialog-buttons { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    </style>
</head>
<body>

    <header>
        <div class="toolbar-group">
            <button onclick="document.getElementById('image-modal').showModal()">🖼️ Ajouter Image</button>
            <button onclick="document.getElementById('video-modal').showModal()">🎥 Ajouter Vidéo</button>
        </div>
        
        <div class="toolbar-group">
            <span>Rendu :</span>
            <button class="btn-secondary" onclick="setDeviceView('mobile-view')" title="Mobile">📱</button>
            <button class="btn-secondary" onclick="setDeviceView('tablet-view')" title="Tablette">💻</button>
            <button class="btn-secondary" onclick="setDeviceView('desktop-view')" title="Bureau">🖥️</button>
            <button id="theme-toggle" class="btn-secondary" title="Thème">🌓 Thème Rendu</button>
        </div>
    </header>

    <main>
        <section class="panel">
            <div class="panel-header">1. Éditeur Visuel</div>
            <div class="text-format-toolbar">
                <button onmousedown="event.preventDefault(); formatText('bold');" title="Gras"><b>G</b></button>
                <button onmousedown="event.preventDefault(); formatText('italic');" title="Italique"><i>I</i></button>
                <button onmousedown="event.preventDefault(); formatText('underline');" title="Souligné"><u>U</u></button>
                <span style="border-left: 1px solid #ccc; margin: 0 4px;"></span>
                <button onmousedown="event.preventDefault(); formatText('formatBlock', 'H1');">H1</button>
                <button onmousedown="event.preventDefault(); formatText('formatBlock', 'H2');">H2</button>
                <button onmousedown="event.preventDefault(); formatText('formatBlock', 'H3');">H3</button>
                <button onmousedown="event.preventDefault(); formatText('formatBlock', 'H4');">H4</button>
                <button onmousedown="event.preventDefault(); formatText('formatBlock', 'P');" title="Paragraphe normal">P</button>
                <span style="border-left: 1px solid #ccc; margin: 0 4px;"></span>
                <button onmousedown="event.preventDefault(); formatText('insertUnorderedList');" title="Liste à puces">Liste</button>
                <button onmousedown="event.preventDefault(); formatText('indent');" title="Créer une sous-liste (Indenter)">➡️ Sous-liste</button>
                <button onmousedown="event.preventDefault(); formatText('outdent');" title="Annuler la sous-liste (Désindenter)">⬅️ Retour</button>
            </div>
            <div class="panel-content" style="padding-top: 5px;">
                <div id="visual-editor" contenteditable="true" data-placeholder="Tapez votre texte ici..."></div>
            </div>
        </section>

        <section class="panel">
            <div class="panel-header">
                2. Code HTML (Modifiable)
                <button onclick="copyHtml()" class="btn-secondary" style="padding: 2px 8px; font-size: 0.8rem;">📋 Copier</button>
            </div>
            <div class="panel-content">
                <textarea id="html-output" placeholder="Le code HTML se générera ici..."></textarea>
            </div>
        </section>

        <section class="panel">
            <div class="panel-header">3. Aperçu Rendu (Appareil)</div>
            <div class="panel-content preview-container">
                <div id="preview-output" class="desktop-view theme-light"></div>
            </div>
        </section>
    </main>

    <dialog id="image-modal">
        <h3>Insérer une Image</h3>
        <div class="form-group"><label>URL :</label><input type="text" id="img-url" placeholder="https://..."></div>
        <div class="form-group"><label>Alt :</label><input type="text" id="img-alt" placeholder="Description..."></div>
        <div class="form-group"><label>Légende :</label><input type="text" id="img-caption" placeholder="Légende..."></div>
        <div class="form-group"><label>Taille :</label><input type="text" id="img-size" value="100%"></div>
        <div class="form-group"><label>Arrondi :</label><input type="text" id="img-radius" value="8px"></div>
        <div class="dialog-buttons">
            <button class="btn-secondary" onclick="closeModal('image-modal')">Annuler</button>
            <button onclick="insertMedia('image')">Valider</button>
        </div>
    </dialog>

    <dialog id="video-modal">
        <h3>Insérer une Vidéo</h3>
        <div class="form-group"><label>Lien :</label><input type="text" id="vid-url" placeholder="https://..."></div>
        <div class="form-group"><label>Alt :</label><input type="text" id="vid-alt" placeholder="Titre..."></div>
        <div class="form-group"><label>Légende :</label><input type="text" id="vid-caption" placeholder="Légende..."></div>
        <div class="form-group"><label>Taille :</label><input type="text" id="vid-size" value="100%"></div>
        <div class="form-group"><label>Arrondi :</label><input type="text" id="vid-radius" value="8px"></div>
        <div class="dialog-buttons">
            <button class="btn-secondary" onclick="closeModal('video-modal')">Annuler</button>
            <button onclick="insertMedia('video')">Valider</button>
        </div>
    </dialog>

    <script>
        const visualEditor = document.getElementById('visual-editor');
        const htmlOutput = document.getElementById('html-output');
        const previewOutput = document.getElementById('preview-output');

        // === Configuration Initiale ===
        // Force l'éditeur à utiliser des balises <p> lors des sauts de ligne
        document.execCommand('defaultParagraphSeparator', false, 'p');

        // === Fonction de Formatage HTML pour la lisibilité ===
        function formatHTML(html) {
            // Liste des balises qui doivent commencer sur une nouvelle ligne
            const blockTags = ['p', 'div', 'h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'ul', 'ol', 'li', 'figure', 'iframe', 'video'];
            let formatted = html.replace(/\n/g, '').replace(/\s+/g, ' '); // Nettoie le code brut
            
            blockTags.forEach(tag => {
                const regexOpen = new RegExp(`(<${tag}(?:\\s[^>]*)?>)`, 'gi');
                const regexClose = new RegExp(`(</${tag}>)`, 'gi');
                formatted = formatted.replace(regexOpen, `\n$1`).replace(regexClose, `$1\n`);
            });

            // Supprime les multiples sauts de lignes vides
            return formatted.replace(/\n\s*\n/g, '\n').trim();
        }

        // === Fonction de Formatage de Texte ===
        function formatText(command, value = null) {
            document.execCommand(command, false, value);
            visualEditor.focus();
            updateFromVisual();
        }

        // === Synchronisation : Sens 1 (Éditeur Visuel -> HTML & Rendu) ===
        function updateFromVisual() {
            const currentHTML = visualEditor.innerHTML;
            
            // Applique le formatage pour que le panneau 2 soit lisible
            htmlOutput.value = formatHTML(currentHTML); 
            previewOutput.innerHTML = currentHTML;
        }

        // === Synchronisation : Sens 2 (HTML Brut -> Éditeur Visuel & Rendu) ===
        function updateFromHtml() {
            const manualHTML = htmlOutput.value;
            
            visualEditor.innerHTML = manualHTML;
            previewOutput.innerHTML = manualHTML;
        }

        // Écouteurs d'événements pour la liaison bidirectionnelle
        visualEditor.addEventListener('input', updateFromVisual);
        htmlOutput.addEventListener('input', updateFromHtml);

        function copyHtml() {
            htmlOutput.select();
            navigator.clipboard.writeText(htmlOutput.value)
                .then(() => alert("Code HTML copié dans le presse-papier !"));
        }

        function setDeviceView(viewClass) {
            const isDark = previewOutput.classList.contains('theme-dark');
            previewOutput.className = isDark ? 'theme-dark' : 'theme-light';
            previewOutput.classList.add(viewClass);
        }

        document.getElementById('theme-toggle').addEventListener('click', () => {
            if (previewOutput.classList.contains('theme-light')) {
                previewOutput.classList.remove('theme-light');
                previewOutput.classList.add('theme-dark');
            } else {
                previewOutput.classList.remove('theme-dark');
                previewOutput.classList.add('theme-light');
            }
        });

        function closeModal(id) { document.getElementById(id).close(); }

        function insertHtmlAtCursor(htmlSnippet) {
            visualEditor.focus();
            const selection = window.getSelection();
            if (selection.getRangeAt && selection.rangeCount > 0) {
                let range = selection.getRangeAt(0);
                if (visualEditor.contains(range.commonAncestorContainer)) {
                    range.deleteContents();
                    const el = document.createElement("div");
                    el.innerHTML = htmlSnippet;
                    const frag = document.createDocumentFragment();
                    let node, lastNode;
                    while ((node = el.firstChild)) { lastNode = frag.appendChild(node); }
                    range.insertNode(frag);
                    if (lastNode) {
                        range = range.cloneRange();
                        range.setStartAfter(lastNode);
                        range.collapse(true);
                        selection.removeAllRanges();
                        selection.addRange(range);
                    }
                } else {
                    visualEditor.insertAdjacentHTML('beforeend', htmlSnippet);
                }
            } else {
                visualEditor.insertAdjacentHTML('beforeend', htmlSnippet);
            }
        }

        function insertMedia(type) {
            let snippet = "";
            if (type === 'image') {
                const url = document.getElementById('img-url').value;
                const alt = document.getElementById('img-alt').value;
                const caption = document.getElementById('img-caption').value;
                const size = document.getElementById('img-size').value;
                const radius = document.getElementById('img-radius').value;
                snippet = `<figure style="margin: 0; text-align: center;"><img src="${url}" alt="${alt}" style="width: ${size}; border-radius: ${radius}; max-width: 100%;">${caption ? `<figcaption style="font-size: 0.9em; color: #666; margin-top: 5px;">${caption}</figcaption>` : ''}</figure><p><br></p>`;
                closeModal('image-modal');
            } else if (type === 'video') {
                const url = document.getElementById('vid-url').value;
                const alt = document.getElementById('vid-alt').value;
                const caption = document.getElementById('vid-caption').value;
                const size = document.getElementById('vid-size').value;
                const radius = document.getElementById('vid-radius').value;
                const ytMatch = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([\w-]{11})/);

                if (ytMatch) {
                    const ytId = ytMatch[1];
                    snippet = `<figure style="margin: 0; text-align: center;"><iframe src="https://www.youtube.com/embed/${ytId}?autoplay=1&mute=1" title="${alt}" style="width: ${size}; aspect-ratio: 16/9; border: none; border-radius: ${radius}; max-width: 100%;" allow="autoplay; encrypted-media" allowfullscreen></iframe>${caption ? `<figcaption style="font-size: 0.9em; color: #666; margin-top: 5px;">${caption}</figcaption>` : ''}</figure><p><br></p>`;
                } else {
                    snippet = `<figure style="margin: 0; text-align: center;"><video src="${url}" title="${alt}" style="width: ${size}; border-radius: ${radius}; max-width: 100%;" autoplay muted loop playsinline></video>${caption ? `<figcaption style="font-size: 0.9em; color: #666; margin-top: 5px;">${caption}</figcaption>` : ''}</figure><p><br></p>`;
                }
                closeModal('video-modal');
            }
            insertHtmlAtCursor(snippet);
            updateFromVisual(); // Utilise la nouvelle fonction de sync
        }

        // Init
        // Ajout d'un <p> vide au démarrage pour forcer la structure
        visualEditor.innerHTML = "<p><br></p>";
        updateFromVisual();
    </script>
</body>
</html>
