<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éditeur 3 Panneaux Pro</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        /* === Variables et Thèmes === */
        :root {
            --bg-color: #f8f9fa;
            --panel-bg: #ffffff;
            --text-color: #212529;
            --border-color: #dee2e6;
            --header-bg: #e9ecef;
            --btn-bg: #0d6efd;
            --btn-text: #ffffff;
            --btn-hover: #0b5ed7;
            --modal-bg: #ffffff;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --border-color: #333333;
            --header-bg: #2d2d2d;
            --btn-bg: #0d6efd;
            --btn-text: #ffffff;
            --btn-hover: #0b5ed7;
            --modal-bg: #2d2d2d;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* === En-tête (Barre d'outils) === */
        header {
            background-color: var(--header-bg);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 10px;
        }

        .toolbar-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        button {
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        button:hover { background-color: var(--btn-hover); }
        
        .btn-secondary {
            background-color: #6c757d;
        }
        .btn-secondary:hover { background-color: #5c636a; }

        /* === Les 3 Panneaux === */
        main {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            flex-grow: 1;
            gap: 10px;
            padding: 10px;
            overflow: hidden;
        }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            background-color: var(--header-bg);
            padding: 8px 12px;
            font-weight: bold;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-content {
            flex-grow: 1;
            padding: 15px;
            overflow-y: auto;
            width: 100%;
            box-sizing: border-box;
        }

        textarea {
            width: 100%;
            height: 100%;
            border: none;
            resize: none;
            background: transparent;
            color: inherit;
            font-family: 'Courier New', monospace;
            outline: none;
        }

        /* === Simulateur Responsive === */
        .preview-container {
            display: flex;
            justify-content: center;
            background-color: #888; /* Fond sombre pour contraster l'écran virtuel */
            padding: 10px;
        }

        #preview-output {
            background-color: #fff; /* Le rendu est toujours sur fond blanc par défaut comme un vrai site */
            color: #000;
            width: 100%; /* Desktop par défaut */
            height: 100%;
            transition: width 0.3s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        #preview-output.mobile-view { width: 375px; }
        #preview-output.tablet-view { width: 768px; }
        #preview-output.desktop-view { width: 100%; }

        /* === Modales (Pop-ups) === */
        dialog {
            background-color: var(--modal-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        dialog::backdrop {
            background: rgba(0, 0, 0, 0.6);
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group input {
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        .dialog-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <div class="toolbar-group">
            <button onclick="document.getElementById('image-modal').showModal()">🖼️ Ajouter Image</button>
            <button onclick="document.getElementById('video-modal').showModal()">🎥 Ajouter Vidéo</button>
        </div>
        
        <div class="toolbar-group">
            <span>Format rendu :</span>
            <button class="btn-secondary" onclick="setDeviceView('mobile-view')" aria-label="Vue Mobile">📱</button>
            <button class="btn-secondary" onclick="setDeviceView('tablet-view')" aria-label="Vue Tablette">💻</button>
            <button class="btn-secondary" onclick="setDeviceView('desktop-view')" aria-label="Vue Bureau">🖥️</button>
        </div>

        <button id="theme-toggle">🌓 Thème</button>
    </header>

    <main>
        <section class="panel">
            <div class="panel-header">
                1. Code HTML (Résultat)
                <button onclick="copyHtml()" class="btn-secondary" style="padding: 2px 8px; font-size: 0.8rem;">📋 Copier</button>
            </div>
            <div class="panel-content">
                <textarea id="html-output" readonly placeholder="Le code HTML apparaîtra ici..."></textarea>
            </div>
        </section>

        <section class="panel">
            <div class="panel-header">2. Éditeur (Markdown / HTML)</div>
            <div class="panel-content">
                <textarea id="markdown-input" placeholder="Tapez votre texte, Markdown ou HTML ici..."></textarea>
            </div>
        </section>

        <section class="panel">
            <div class="panel-header">3. Rendu Web</div>
            <div class="panel-content preview-container">
                <div id="preview-output" class="desktop-view"></div>
            </div>
        </section>
    </main>

    <dialog id="image-modal">
        <h3>Insérer une Image</h3>
        <div class="form-group">
            <label>URL de l'image :</label>
            <input type="text" id="img-url" placeholder="https://...">
        </div>
        <div class="form-group">
            <label>Texte alternatif (Alt - Accessibilité) :</label>
            <input type="text" id="img-alt" placeholder="Description courte...">
        </div>
        <div class="form-group">
            <label>Sous-texte (Légende) :</label>
            <input type="text" id="img-caption" placeholder="Légende affichée sous l'image...">
        </div>
        <div class="form-group">
            <label>Taille (ex: 100%, 300px) :</label>
            <input type="text" id="img-size" value="100%">
        </div>
        <div class="form-group">
            <label>Arrondi des bords (Radius, ex: 8px) :</label>
            <input type="text" id="img-radius" value="8px">
        </div>
        <div class="dialog-buttons">
            <button class="btn-secondary" onclick="closeModal('image-modal')">Annuler</button>
            <button onclick="insertMedia('image')">Valider</button>
        </div>
    </dialog>

    <dialog id="video-modal">
        <h3>Insérer une Vidéo</h3>
        <div class="form-group">
            <label>Lien (YouTube ou fichier .mp4) :</label>
            <input type="text" id="vid-url" placeholder="https://...">
        </div>
        <div class="form-group">
            <label>Titre (Alt - Accessibilité) :</label>
            <input type="text" id="vid-alt" placeholder="Titre de la vidéo...">
        </div>
        <div class="form-group">
            <label>Sous-texte (Légende) :</label>
            <input type="text" id="vid-caption" placeholder="Légende affichée sous la vidéo...">
        </div>
        <div class="form-group">
            <label>Taille (ex: 100%, 500px) :</label>
            <input type="text" id="vid-size" value="100%">
        </div>
        <div class="form-group">
            <label>Arrondi des bords (Radius, ex: 8px) :</label>
            <input type="text" id="vid-radius" value="8px">
        </div>
        <div class="dialog-buttons">
            <button class="btn-secondary" onclick="closeModal('video-modal')">Annuler</button>
            <button onclick="insertMedia('video')">Valider</button>
        </div>
    </dialog>

    <script>
        const markdownInput = document.getElementById('markdown-input');
        const htmlOutput = document.getElementById('html-output');
        const previewOutput = document.getElementById('preview-output');

        // === Mise à jour Temps Réel ===
        function updatePanels() {
            const rawText = markdownInput.value;
            const htmlContent = marked.parse(rawText); // Convertit en HTML
            
            // Mise à jour du panneau 1 (Code) et 3 (Rendu)
            htmlOutput.value = htmlContent;
            previewOutput.innerHTML = htmlContent;
        }

        markdownInput.addEventListener('input', updatePanels);

        // === Copier le code HTML ===
        function copyHtml() {
            htmlOutput.select();
            navigator.clipboard.writeText(htmlOutput.value)
                .then(() => alert("Code HTML copié dans le presse-papier !"));
        }

        // === Simulateur Responsive ===
        function setDeviceView(viewClass) {
            previewOutput.className = ''; // Réinitialise les classes
            previewOutput.classList.add(viewClass);
        }

        // === Thème ===
        document.getElementById('theme-toggle').addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            document.documentElement.setAttribute('data-theme', currentTheme === 'dark' ? 'light' : 'dark');
        });

        // === Gestion des Modales et Insertion Médias ===
        function closeModal(id) {
            document.getElementById(id).close();
        }

        function insertMedia(type) {
            let snippet = "";

            if (type === 'image') {
                const url = document.getElementById('img-url').value;
                const alt = document.getElementById('img-alt').value;
                const caption = document.getElementById('img-caption').value;
                const size = document.getElementById('img-size').value;
                const radius = document.getElementById('img-radius').value;

                snippet = `
<figure style="margin: 0; text-align: center;">
    <img src="${url}" alt="${alt}" style="width: ${size}; border-radius: ${radius}; max-width: 100%;">
    ${caption ? `<figcaption style="font-size: 0.9em; color: #666; margin-top: 5px;">${caption}</figcaption>` : ''}
</figure>
`;
                closeModal('image-modal');
            } 
            
            else if (type === 'video') {
                const url = document.getElementById('vid-url').value;
                const alt = document.getElementById('vid-alt').value;
                const caption = document.getElementById('vid-caption').value;
                const size = document.getElementById('vid-size').value;
                const radius = document.getElementById('vid-radius').value;

                // Détection de lien YouTube via une expression régulière
                const ytMatch = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([\w-]{11})/);

                if (ytMatch) {
                    // C'est un lien YouTube (ajout de autoplay=1 et mute=1)
                    const ytId = ytMatch[1];
                    snippet = `
<figure style="margin: 0; text-align: center;">
    <iframe src="https://www.youtube.com/embed/${ytId}?autoplay=1&mute=1" title="${alt}" style="width: ${size}; aspect-ratio: 16/9; border: none; border-radius: ${radius}; max-width: 100%;" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    ${caption ? `<figcaption style="font-size: 0.9em; color: #666; margin-top: 5px;">${caption}</figcaption>` : ''}
</figure>
`;
                } else {
                    // Fichier vidéo classique (lancement auto sans son)
                    snippet = `
<figure style="margin: 0; text-align: center;">
    <video src="${url}" title="${alt}" style="width: ${size}; border-radius: ${radius}; max-width: 100%;" autoplay muted loop playsinline></video>
    ${caption ? `<figcaption style="font-size: 0.9em; color: #666; margin-top: 5px;">${caption}</figcaption>` : ''}
</figure>
`;
                }
                closeModal('video-modal');
            }

            // Insertion du snippet là où se trouve le curseur dans l'éditeur
            const startPos = markdownInput.selectionStart;
            const textBefore = markdownInput.value.substring(0, startPos);
            const textAfter = markdownInput.value.substring(markdownInput.selectionEnd);

            markdownInput.value = textBefore + snippet + textAfter;
            
            // Replacer le curseur et mettre à jour
            markdownInput.focus();
            markdownInput.selectionStart = startPos + snippet.length;
            markdownInput.selectionEnd = startPos + snippet.length;
            
            updatePanels();
        }

        // Init
        updatePanels();
    </script>
</body>
</html>
